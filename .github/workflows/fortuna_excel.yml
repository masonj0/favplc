name: "📊 FortunaDB to CSV/TSV Export"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *' # Daily at 10 PM ET

jobs:
  export-excel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10.16'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Restore Master Database
        uses: actions/cache/restore@v4
        with:
          path: fortuna.db
          key: fortuna-db-v4-master-
          restore-keys: fortuna-db-v4-master-

      - name: Run CSV/TSV Export
        run: |
          if [ -f fortuna.db ]; then
            python3 scripts/fortuna_export.py fortuna.db --output-dir db_export --format both
          else
            echo "Database not found, creating empty directory"
            mkdir -p db_export
          fi

      - name: Upload Export Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fortuna-db-export
          path: db_export/
          retention-days: 7
