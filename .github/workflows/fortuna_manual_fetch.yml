name: Fortuna Manual Ingest

on:
  workflow_dispatch:
    inputs:
      daypart:
        description: 'Target DayPart (Q1, Q2, Q3, Q4)'
        required: true
        default: 'auto'
      list_links_only:
        description: 'Only list links to fetch, do not ingest'
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONPATH: .
      FORTUNA_NO_BROWSER: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.20'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: List Links (Discovery)
        if: ${{ github.event.inputs.list_links_only == 'true' }}
        run: |
          python fortuna_interactive.py --region GLOBAL --daypart ${{ github.event.inputs.daypart }} --list-links
          if [ -f manual_links.md ]; then
            cat manual_links.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Manual Ingest (Process Files)
        if: ${{ github.event.inputs.list_links_only == 'false' }}
        run: |
          python fortuna_interactive.py --region GLOBAL --daypart ${{ github.event.inputs.daypart }} --quarter-fetch
          python fortuna_interactive.py --score-now

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manual-ingest-results
          path: |
            summary_grid.txt
            fortuna_report.html
            fortuna.db
            manual_links.*
