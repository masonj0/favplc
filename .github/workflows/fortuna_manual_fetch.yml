name: Fortuna Manual Ingest (v3.3.0)

on:
  workflow_dispatch:
    inputs:
      daypart:
        description: 'Target DayPart (auto, Q1, Q2, Q3, Q4)'
        required: true
        default: 'auto'
        type: choice
        options: [auto, Q1, Q2, Q3, Q4]
      mode:
        description: 'Execution Mode'
        required: true
        default: 'ingest-and-score'
        type: choice
        options: [ingest-and-score, audit-only]
      region:
        description: 'Region Filter'
        required: true
        default: 'GLOBAL'
        type: choice
        options: [GLOBAL, USA, INT]

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONPATH: .
      FORTUNA_NO_BROWSER: "1"
      FORTUNA_DB_PATH: "fortuna.db"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.16'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Database Cache
        uses: actions/cache/restore@v4
        with:
          path: fortuna.db
          key: fortuna-db-v3-${{ github.run_number }}
          restore-keys: |
            fortuna-db-v3-

      - name: Verify Manual Files
        if: ${{ github.event.inputs.mode == 'ingest-and-score' }}
        run: |
          echo "## 📂 Manual Ingest Status" >> $GITHUB_STEP_SUMMARY
          if [ -d "manual_fetch" ] && [ "$(ls -A manual_fetch 2>/dev/null)" ]; then
            echo "✅ Found $(ls -1 manual_fetch | wc -l) files in manual_fetch/" >> $GITHUB_STEP_SUMMARY
            ls -lh manual_fetch >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Warning: manual_fetch/ is empty or missing. Ingest will likely find 0 races." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Manual Ingest & Score
        if: ${{ github.event.inputs.mode == 'ingest-and-score' }}
        run: |
          # 1. Structural Ingest
          python fortuna_interactive.py --region ${{ github.event.inputs.region }} --daypart ${{ github.event.inputs.daypart }} --quarter-fetch

          # 2. Scoring Loop
          python fortuna_interactive.py --region ${{ github.event.inputs.region }} --daypart ${{ github.event.inputs.daypart }} --score-now

      - name: Run Results Audit
        if: ${{ github.event.inputs.mode == 'audit-only' }}
        run: |
          # Audit results from the last 7 days
          python fortuna_analytics.py --days 7

      - name: Export to CSV/TSV
        if: always()
        run: |
          python3 scripts/fortuna_export.py fortuna.db --output-dir db_export --format both

      - name: Generate GHA Summary
        if: always()
        run: |
          python scripts/generate_gha_summary.py
          # The script appends to $GITHUB_STEP_SUMMARY

      - name: Save Database Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: fortuna.db
          key: fortuna-db-v3-${{ github.run_number }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-ingest-results-${{ github.run_number }}
          path: |
            summary_grid.txt
            goldmine_report.txt
            fortuna_report.html
            fortuna.db
            db_export/
            snapshots/*.json
