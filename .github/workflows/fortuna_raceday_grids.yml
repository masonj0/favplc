name: Fortuna Raceday Grid Generator

on:
  schedule:
    # Run twice a day: 10:00 AM ET and 1:00 PM ET
    # 10:00 AM ET is 14:00 UTC
    # 1:00 PM ET is 17:00 UTC
    - cron: '0 14,17 * * *'
  workflow_dispatch:
    inputs:
      force_cleanup:
        description: 'Run cleanup before grid generation'
        type: boolean
        default: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONPATH: .
      FORTUNA_NO_BROWSER: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Workspace Hygiene
        run: |
          python scripts/cleanup_obsolete_grids.py

      - name: Discovery Sweep (Q2/Q3 Transition)
        run: |
          # Fetch entries for today
          python fortuna.py --quarter-fetch --region GLOBAL --include SportingLife,RacingPost

      - name: Generate Race Grids
        run: |
          python scripts/generate_race_grid.py

      - name: Generate Tactical Trigger Sheets
        run: |
          python scripts/generate_hourly_trigger_sheet.py
          python scripts/generate_strategy_trigger_sheet.py

      - name: Commit & Push Artifacts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.html v3_*_sheet_*.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated Raceday Grid Update - $(date +'%Y-%m-%d')"
          git push
